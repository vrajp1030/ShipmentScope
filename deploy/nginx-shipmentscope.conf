# nginx reverse proxy for ShipmentScope on a Lightsail (Ubuntu) box.
#
# Install:
#   1. Replace YOUR_DOMAIN.com below with your real domain (or the instance's
#      public IP if you don't have a domain yet).
#   2. sudo cp deploy/nginx-shipmentscope.conf /etc/nginx/sites-available/shipmentscope
#   3. sudo ln -sf /etc/nginx/sites-available/shipmentscope /etc/nginx/sites-enabled/shipmentscope
#   4. sudo rm -f /etc/nginx/sites-enabled/default   # drop the "Welcome to nginx" page
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. sudo certbot --nginx -d YOUR_DOMAIN.com -d www.YOUR_DOMAIN.com
#      (certbot rewrites this file to add the HTTPS :443 server block + an
#       automatic http→https redirect, and sets up auto-renewal.)

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Order records embed email HTML, so POST /api/orders can be a few MB.
    client_max_body_size 12m;

    location / {
        proxy_pass http://127.0.0.1:3876;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # The app reads this to know it's behind HTTPS (enables Secure cookies + HSTS).
        proxy_set_header X-Forwarded-Proto $scheme;
        # IMAP inbox scans can run up to ~a minute — don't cut them off.
        proxy_read_timeout 120s;
    }
}
