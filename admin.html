<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShipmentScope — Developer Stats</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" type="image/png" href="/assets/favicon.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Outfit:wght@400..600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#070812;--panel:#111423;--panel2:#171b2c;--panel3:#20263a;
  --brd:rgba(140,153,190,0.18);--brd2:rgba(186,215,247,0.22);
  --txt:#eef4ff;--txt2:#c9d4ea;--txt3:#7f8aa7;
  --accent:#7c5cff;--accent2:#6eb3f7;--accent-d:rgba(124,92,255,0.16);
  --green:#4fbf8b;--amber:#e0a742;--red:#f2665e;--purple:#9c8cec;
  --font-display:'Outfit',ui-sans-serif,system-ui,sans-serif;
}
body{background:linear-gradient(180deg,#090a16 0%,#05060f 100%);color:var(--txt);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding:30px 22px;}
.wrap{max-width:1180px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:18px;}
.hdr{display:flex;align-items:center;gap:12px;}
.hdr img{box-shadow:0 0 0 1px rgba(255,255,255,.12),0 14px 28px rgba(0,0,0,.35);}
.hdr-title{font-family:var(--font-display);font-size:24px;font-weight:600;letter-spacing:-.2px;}
.hdr-title .accent{color:var(--accent);}
.sub{font-size:13px;color:var(--txt3);font-weight:600;margin-top:3px;}
.admin-badge{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--brd);border-radius:999px;padding:9px 13px;color:var(--txt2);font-size:12px;font-weight:700;}
.admin-badge i{color:var(--green);font-size:14px;}
.hero{display:grid;grid-template-columns:1.25fr .75fr;gap:16px;margin-bottom:18px;}
.hero-card{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(124,92,255,.2),rgba(110,179,247,.08) 48%,rgba(79,191,139,.08));border:1px solid var(--brd2);border-radius:18px;padding:24px;min-height:178px;box-shadow:0 22px 48px rgba(0,0,0,.28);}
.hero-card::after{content:'';position:absolute;inset:auto 0 0 0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.7;}
.hero-kicker{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent2);margin-bottom:12px;}
.hero-title{font-family:var(--font-display);font-size:34px;font-weight:700;letter-spacing:-.6px;max-width:560px;line-height:1.08;}
.hero-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
.hero-chip{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);border-radius:999px;padding:7px 10px;font-size:12px;color:var(--txt2);font-weight:700;}
.pulse-card{background:var(--panel);border:1px solid var(--brd);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:12px;}
.pulse-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--brd);border-radius:12px;padding:12px 13px;}
.pulse-row span{font-size:12px;color:var(--txt3);font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
.pulse-row strong{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.section-lbl{font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1.2px;margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
.section-lbl::before{content:'';width:22px;height:1px;background:var(--accent);}
.tiles{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;}
.tile{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--brd);border-radius:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 16px 34px rgba(0,0,0,.22);padding:18px;position:relative;overflow:hidden;}
.tile::after{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--tone,var(--accent));opacity:.8;}
.tile-ico{width:38px;height:38px;border-radius:12px;background:color-mix(in srgb,var(--tone,var(--accent)) 18%,transparent);color:var(--tone,var(--accent));display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;}
.tile-val{font-family:var(--font-display);font-size:34px;font-weight:700;letter-spacing:-.5px;font-variant-numeric:tabular-nums;color:var(--txt);}
.tile-lbl{font-size:13px;font-weight:750;color:var(--txt2);margin-top:5px;}
.tile-sub{font-size:12px;color:var(--txt3);margin-top:4px;line-height:1.35;}
.tile.accent{--tone:var(--accent);}
.tile.green{--tone:var(--green);}
.tile.amber{--tone:var(--amber);}
.tile.purple{--tone:var(--purple);}
.grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;}
.panel{background:var(--panel);border:1px solid var(--brd);border-radius:16px;padding:16px;box-shadow:0 16px 34px rgba(0,0,0,.18);}
.panel h2{font-size:15px;font-weight:850;margin-bottom:12px;}
.status-bars{display:flex;flex-direction:column;gap:10px;}
.status-row{display:grid;grid-template-columns:96px 1fr 44px;align-items:center;gap:10px;font-size:12px;color:var(--txt2);font-weight:700;}
.status-track{height:9px;background:var(--panel3);border-radius:999px;overflow:hidden;border:1px solid var(--brd);}
.status-fill{height:100%;background:var(--tone);border-radius:999px;}
.leader-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd);}
.leader-row:last-child{border-bottom:none;}
.avatar{width:32px;height:32px;border-radius:10px;background:var(--accent-d);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;text-transform:uppercase;}
.leader-main{flex:1;min-width:0;}
.leader-main b{display:block;font-size:12.5px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.leader-main span{font-size:11.5px;color:var(--txt3);}
.leader-score{font-size:13px;font-weight:850;color:var(--green);}
.empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.empty i{font-size:36px;display:block;margin-bottom:10px;}
.err{background:rgba(242,102,94,.13);border:1px solid rgba(242,102,94,.3);color:var(--red);border-radius:6px;padding:14px 16px;font-size:13px;font-weight:500;}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--panel);border:1px solid var(--brd);border-radius:14px;overflow:hidden;font-size:12.5px;}
th{background:var(--panel3);text-align:left;padding:11px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--txt3);}
td{padding:10px 12px;border-top:1px solid var(--brd);color:var(--txt2);font-variant-numeric:tabular-nums;}
tr:hover td{background:rgba(255,255,255,.025);}
td.num{text-align:right;}th.num{text-align:right;}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;}
.pill.ok{background:rgba(79,191,139,.15);color:var(--green);}
.pill.warn{background:rgba(224,167,66,.15);color:var(--amber);}
.pill.bad{background:rgba(242,102,94,.15);color:var(--red);}
.pill.inf{background:rgba(156,140,236,.15);color:var(--purple);}
.fb{background:var(--panel);border:1px solid var(--brd);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fb .who{font-size:11px;color:var(--txt3);margin-bottom:4px;}
.fb .msg{font-size:13px;color:var(--txt2);white-space:pre-wrap;}
.tbl-scroll{overflow-x:auto;}
.giveaway{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;}
.giveaway-card{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;background:var(--panel2);border:1px solid var(--brd);border-radius:13px;padding:12px;}
.rank{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:950;color:white;box-shadow:0 10px 24px rgba(124,92,255,.25);}
.giveaway-card:nth-child(1) .rank{background:linear-gradient(135deg,#f3c769,#e8943d);}
.giveaway-card:nth-child(2) .rank{background:linear-gradient(135deg,#b9c7df,#7f8da8);}
.giveaway-card:nth-child(3) .rank{background:linear-gradient(135deg,#d68d56,#925333);}
.giveaway-main{min-width:0;}
.giveaway-main b{display:block;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.giveaway-main span{display:block;margin-top:3px;font-size:11.5px;color:var(--txt3);}
.giveaway-score{text-align:right;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;}
.controls{min-width:360px;}
.ctl-row{display:flex;gap:6px;flex-wrap:wrap;}
.ctl{border:1px solid var(--brd2);background:rgba(255,255,255,.055);color:var(--txt2);border-radius:8px;padding:6px 8px;font-size:11px;font-weight:850;cursor:pointer;transition:.15s ease;}
.ctl:hover{transform:translateY(-1px);border-color:rgba(124,92,255,.6);color:white;background:rgba(124,92,255,.18);}
.ctl.good{border-color:rgba(79,191,139,.35);color:var(--green);}
.ctl.warn{border-color:rgba(224,167,66,.35);color:var(--amber);}
.ctl.bad{border-color:rgba(242,102,94,.35);color:var(--red);}
.admin-field{width:100%;background:var(--panel2);border:1px solid var(--brd);border-radius:9px;color:var(--txt);padding:9px 10px;font-size:12.5px;font-weight:650;outline:none;}
.admin-field:focus{border-color:rgba(124,92,255,.65);box-shadow:0 0 0 3px rgba(124,92,255,.14);}
.form-grid{display:grid;grid-template-columns:1fr 120px auto;gap:8px;align-items:end;}
.mini-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;}
.mini-list{display:flex;flex-direction:column;gap:8px;}
.mini-item{background:var(--panel2);border:1px solid var(--brd);border-radius:12px;padding:10px 12px;color:var(--txt2);font-size:12px;line-height:1.45;}
.mini-item b{display:block;color:var(--txt);font-size:12.5px;margin-bottom:2px;}
.mini-muted{color:var(--txt3);font-size:11.5px;}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
@media(max-width:960px){.hero,.grid-2{grid-template-columns:1fr;}.tiles{grid-template-columns:repeat(2,minmax(0,1fr));}.hero-title{font-size:28px;}}
@media(max-width:760px){.giveaway{grid-template-columns:1fr;}}
@media(max-width:620px){body{padding:18px 12px;}.topbar{align-items:flex-start;flex-direction:column;}.tiles,.mini-grid{grid-template-columns:1fr;}.form-grid{grid-template-columns:1fr;}.status-row{grid-template-columns:78px 1fr 36px;}.hero-card{padding:18px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="hdr">
        <img src="/assets/logo.png" width="30" height="30" alt="ShipmentScope" style="border-radius:22%;display:block;"/>
        <div class="hdr-title">Shipment<span class="accent">Scope</span> Command</div>
      </div>
      <div class="sub">Real usage across every account on this install.</div>
    </div>
    <div class="admin-badge"><i class="ti ti-shield-lock"></i> Admin console</div>
  </div>
  <div id="content"><div class="empty"><i class="ti ti-loader-2"></i><p>Loading…</p></div></div>
</div>
<script>
let latestStats=null;
let operatorData={broadcast:{},activity:[],reports:[],giveaway:{history:[]},invites:[]};
let adminUserQuery='', adminUserFilter='all';
function setAdminUserSearch(v){adminUserQuery=String(v||'').toLowerCase();load();}
function setAdminUserFilter(v){adminUserFilter=v||'all';load();}
async function adminPost(url,body){
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  const data=await res.json();
  if(!data.ok)throw new Error(data.message||'Action failed');
  return data;
}
async function saveBroadcast(enabled=true){
  try{
    const msg=document.getElementById('admin-broadcast-msg').value.trim();
    const expiresAt=document.getElementById('admin-broadcast-exp').value;
    await adminPost('/api/admin/broadcast',{message:msg,enabled,expiresAt});
    await load();
  }catch(e){alert(e.message||'Could not save broadcast.');}
}
async function createInviteCode(){
  try{
    await adminPost('/api/admin/invite-code',{
      code:document.getElementById('invite-code').value.trim(),
      maxUses:document.getElementById('invite-uses').value,
      label:document.getElementById('invite-label').value.trim()
    });
    await load();
  }catch(e){alert(e.message||'Could not create invite.');}
}
async function toggleInvite(code,active){
  try{await adminPost('/api/admin/invite-code',{action:'toggle',code,active});await load();}
  catch(e){alert(e.message||'Could not update invite.');}
}
async function saveGiveaway(){
  try{
    await adminPost('/api/admin/giveaway',{
      action:'save',
      title:document.getElementById('giveaway-title').value.trim(),
      start:document.getElementById('giveaway-start').value,
      end:document.getElementById('giveaway-end').value
    });
    await load();
  }catch(e){alert(e.message||'Could not save giveaway.');}
}
async function pickGiveawayWinnerServer(){
  try{
    const data=await adminPost('/api/admin/giveaway',{action:'pick'});
    const winner=(data.giveaway.history||[])[0];
    alert(winner?'Winner: '+winner.email:'Winner picked.');
    await load();
  }catch(e){alert(e.message||'Could not pick a winner.');}
}
async function sendWeeklyRecaps(){
  if(!confirm('Send weekly recap emails to users who turned on email alerts?'))return;
  try{
    const data=await adminPost('/api/admin/send-weekly-recaps',{});
    alert('Sent '+data.sent+' weekly recap email'+(data.sent===1?'':'s')+'.');
    await load();
  }catch(e){alert(e.message||'Could not send recaps.');}
}
async function adminAction(userId,action,days){
  const labels={
    'extend-trial':'extend this trial',
    'set-trial-days':'set this trial',
    'make-unlimited':'make this user unlimited',
    'expire-trial':'expire this trial',
    'reset-referral':'reset this referral code',
    'reset-devices':'reset trusted devices',
    'disconnect-email':'disconnect this user email sync',
    'force-logout':'force this user to log in again'
  };
  if(action==='set-trial-days'){
    const entered=prompt('How many trial days should this user have from today?',String(days||70));
    if(entered===null)return;
    days=Number(entered);
    if(!Number.isFinite(days)||days<0){alert('Enter a valid number of days.');return;}
  }
  if(['expire-trial','reset-referral','reset-devices','disconnect-email','force-logout'].includes(action)){
    if(!confirm('Confirm: '+(labels[action]||'run this action')+'?'))return;
  }
  try{
    const res=await fetch('/api/admin/user-action',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({userId,action,days})
    });
    const data=await res.json();
    if(!data.ok)throw new Error(data.message||'Action failed');
    await load();
  }catch(e){
    alert(e.message||'Could not update user.');
  }
}
function giveawayPool(){
  const users=(latestStats&&latestStats.perUser)||[];
  return users.filter(u=>(u.ordersThisMonth||0)>0).sort((a,b)=>(b.ordersThisMonth||0)-(a.ordersThisMonth||0));
}
function pickGiveawayWinner(){
  const pool=giveawayPool();
  if(!pool.length){alert('No eligible users with orders this month yet.');return;}
  const winner=pool[Math.floor(Math.random()*pool.length)];
  alert('Giveaway winner: '+winner.email+'\\nThis month: '+winner.ordersThisMonth+' order'+(winner.ordersThisMonth===1?'':'s'));
}
function exportGiveawayCSV(){
  const pool=giveawayPool();
  if(!pool.length){alert('No leaderboard rows to export yet.');return;}
  const escCsv=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const rows=[['Rank','Email','Orders This Month','Total Orders','Spend','Referrals'].map(escCsv).join(',')];
  pool.forEach((u,i)=>rows.push([i+1,u.email,u.ordersThisMonth,u.orders,u.spend,u.referralCount].map(escCsv).join(',')));
  const blob=new Blob([rows.join('\\n')],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='shipmentscope-giveaway-leaderboard.csv';
  document.body.appendChild(a);a.click();a.remove();
}
async function load(){
  const el=document.getElementById('content');
  try{
    const res=await fetch('/api/admin/stats');
    const data=await res.json();
    if(!data.ok){el.innerHTML='<div class="err">'+(data.message||'Could not load stats.')+'</div>';return;}
    const s=data.stats;
    latestStats=s;
    try{
      const opRes=await fetch('/api/admin/operator');
      const opData=await opRes.json();
      if(opData.ok)operatorData={broadcast:opData.broadcast||{},activity:opData.activity||[],reports:opData.reports||[],giveaway:opData.giveaway||{history:[]},invites:opData.invites||[]};
    }catch(_){}
    if(!s.totalUsers){el.innerHTML='<div class="empty"><i class="ti ti-chart-bar"></i><p>No accounts yet — stats will appear once people sign up.</p></div>';return;}
    const esc=t=>String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const attr=t=>esc(t).replace(/"/g,'&quot;');
    const fdate=t=>t?new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    const money=n=>'$'+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:2});
    const pct=(part,total)=>total?Math.round(part/total*100):0;
    const initials=email=>String(email||'?').slice(0,1);
    const trialPill=d=>d==null?'<span class="pill inf">∞ unlimited</span>':d<=0?'<span class="pill bad">expired</span>':d<=10?'<span class="pill warn">'+d+'d left</span>':'<span class="pill ok">'+d+'d left</span>';
    const users=s.perUser||[];
    const userMatches=u=>{
      const q=adminUserQuery.trim();
      if(q && !String(u.email||'').toLowerCase().includes(q))return false;
      if(adminUserFilter==='expired')return u.trialDaysLeft!=null&&u.trialDaysLeft<=0;
      if(adminUserFilter==='expiring')return u.trialDaysLeft!=null&&u.trialDaysLeft>0&&u.trialDaysLeft<=10;
      if(adminUserFilter==='connected')return (u.connectedAccounts||0)>0;
      if(adminUserFilter==='no-orders')return (u.orders||0)===0;
      if(adminUserFilter==='top-orders')return (u.ordersThisMonth||0)>0;
      return true;
    };
    const visibleUsers=users.filter(userMatches).sort((a,b)=>adminUserFilter==='top-orders'?(b.ordersThisMonth||0)-(a.ordersThisMonth||0):0);
    const topOrders=[...users].sort((a,b)=>(b.ordersThisMonth-a.ordersThisMonth)||(b.orders-a.orders)).slice(0,10);
    const topReferrals=[...users].sort((a,b)=>b.referralCount-a.referralCount).slice(0,5);
    const op=operatorData||{};
    const giveaway=op.giveaway||{history:[]};
    const broadcast=op.broadcast||{};
    const reports=op.reports||[];
    const activity=op.activity||[];
    const invites=op.invites||[];
    const supportItems=[
      ...reports.map(r=>({kind:'Order report',email:r.email,ts:r.ts,message:r.message,meta:r.order&&r.order.name})),
      ...(s.feedback||[]).map(f=>({kind:'Feedback',email:f.email,ts:f.ts,message:f.message,meta:'General app feedback'})),
    ].sort((a,b)=>new Date(b.ts||0)-new Date(a.ts||0)).slice(0,10);
    const activityLine=a=>[
      a.email||'',
      a.action?'Action: '+a.action:'',
      a.days!==''&&a.days!=null?'Days: '+a.days:'',
      a.code?'Code: '+a.code:'',
      a.sent!=null?'Sent: '+a.sent:'',
      a.winner?'Winner: '+a.winner:'',
      a.message?'Note: '+String(a.message).slice(0,80):'',
    ].filter(Boolean).join(' · ');
    const expiring=users.filter(u=>u.trialDaysLeft!=null&&u.trialDaysLeft<=10).length;
    const connectedRate=pct(s.totalAccounts,s.totalUsers);
    const statusTone={ordered:'#6eb3f7',shipped:'#e0a742',delivered:'#4fbf8b',cancelled:'#f2665e',preorder:'#9c8cec'};
    el.innerHTML=
      '<div class="hero">'+
        '<div class="hero-card">'+
          '<div class="hero-kicker">Live operator overview</div>'+
          '<div class="hero-title">'+s.totalUsers.toLocaleString()+' accounts are tracking '+s.totalOrders.toLocaleString()+' orders through ShipmentScope.</div>'+
          '<div class="hero-meta">'+
            '<span class="hero-chip">'+s.signups7d+' signups this week</span>'+
            '<span class="hero-chip">'+s.active7d+' active this week</span>'+
            '<span class="hero-chip">'+connectedRate+'% connected email</span>'+
            '<span class="hero-chip">'+expiring+' trials need attention</span>'+
          '</div>'+
        '</div>'+
        '<div class="pulse-card">'+
          '<div class="pulse-row"><span>Monthly order value</span><strong>'+money(s.valueThisMonth)+'</strong></div>'+
          '<div class="pulse-row"><span>Orders this month</span><strong>'+s.ordersThisMonth.toLocaleString()+'</strong></div>'+
          '<div class="pulse-row"><span>Avg orders/user</span><strong>'+s.avgOrdersPerUser+'</strong></div>'+
        '</div>'+
      '</div>'+
      '<div class="tiles">'+
        '<div class="tile accent"><div class="tile-ico"><i class="ti ti-users"></i></div><div class="tile-val">'+s.totalUsers.toLocaleString()+'</div><div class="tile-lbl">Total accounts</div><div class="tile-sub">'+s.signups7d+' new this week · '+s.signups30d+' this month</div></div>'+
        '<div class="tile green"><div class="tile-ico"><i class="ti ti-package"></i></div><div class="tile-val">'+s.ordersThisMonth.toLocaleString()+'</div><div class="tile-lbl">Orders this month</div><div class="tile-sub">'+money(s.valueThisMonth)+' this month · '+s.totalOrders.toLocaleString()+' all-time</div></div>'+
        '<div class="tile amber"><div class="tile-ico"><i class="ti ti-currency-dollar"></i></div><div class="tile-val">'+money(s.totalValue)+'</div><div class="tile-lbl">Order value tracked</div><div class="tile-sub">excludes cancelled</div></div>'+
        '<div class="tile purple"><div class="tile-ico"><i class="ti ti-mail-check"></i></div><div class="tile-val">'+s.totalAccounts.toLocaleString()+'</div><div class="tile-lbl">Email accounts connected</div><div class="tile-sub">'+(s.totalInventoryItems||0).toLocaleString()+' inventory items tracked</div></div>'+
      '</div>'+
      '<div class="section-lbl">Engagement</div>'+
      '<div class="tiles">'+
        '<div class="tile"><div class="tile-ico"><i class="ti ti-activity"></i></div><div class="tile-val">'+s.active7d.toLocaleString()+'</div><div class="tile-lbl">Active in last 7 days</div><div class="tile-sub">logged in at least once</div></div>'+
        '<div class="tile"><div class="tile-ico"><i class="ti ti-calendar-stats"></i></div><div class="tile-val">'+(s.active30d||0).toLocaleString()+'</div><div class="tile-lbl">Active in last 30 days</div></div>'+
        '<div class="tile"><div class="tile-ico"><i class="ti ti-chart-dots"></i></div><div class="tile-val">'+s.avgOrdersPerUser+'</div><div class="tile-lbl">Avg orders per account</div></div>'+
      '</div>'+
      '<div class="section-lbl">Giveaway order leaderboard</div>'+
      '<div class="panel">'+
        '<div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px;"><button class="ctl good" onclick="pickGiveawayWinner()">Pick random winner</button><button class="ctl" onclick="exportGiveawayCSV()">Export CSV</button></div>'+
        '<div class="giveaway">'+
          (topOrders.length?topOrders.map((u,i)=>'<div class="giveaway-card"><div class="rank">'+(i+1)+'</div><div class="giveaway-main"><b>'+esc(u.email)+'</b><span>'+u.ordersThisMonth+' orders this month · '+money(u.spend)+' tracked</span></div><div class="giveaway-score">'+u.orders+'<br><span style="font-size:10px;color:var(--txt3);font-weight:800;">orders</span></div></div>').join(''):'<div class="sub">No order activity yet.</div>')+
        '</div>'+
      '</div>'+
      '<div class="section-lbl">Operator controls</div>'+
      '<div class="mini-grid">'+
        '<div class="panel"><h2>Broadcast</h2><textarea class="admin-field" id="admin-broadcast-msg" rows="4" placeholder="Message shown to logged-in users">'+esc(broadcast.message||'')+'</textarea><input class="admin-field" id="admin-broadcast-exp" type="date" value="'+attr(String(broadcast.expiresAt||'').slice(0,10))+'" style="margin-top:8px;"/><div class="panel-actions"><button class="ctl good" onclick="saveBroadcast(true)">Publish</button><button class="ctl bad" onclick="saveBroadcast(false)">Turn off</button></div><div class="mini-muted">'+(broadcast.enabled!==false&&broadcast.message?'Active':'No active message')+'</div></div>'+
        '<div class="panel"><h2>Beta invites</h2><div class="form-grid"><input class="admin-field" id="invite-code" placeholder="Optional code"/><input class="admin-field" id="invite-uses" type="number" min="1" value="1"/><button class="ctl good" onclick="createInviteCode()">Create</button></div><input class="admin-field" id="invite-label" placeholder="Label, like Discord giveaway" style="margin-top:8px;"/><div class="mini-list" style="margin-top:10px;">'+
          (invites.length?invites.slice(0,6).map(x=>'<div class="mini-item"><b>'+esc(x.code)+'</b><span class="mini-muted">'+(x.used||0)+' / '+(x.maxUses||1)+' used'+(x.label?' · '+esc(x.label):'')+'</span><div class="panel-actions"><button class="ctl '+(x.active!==false?'bad':'good')+'" onclick="toggleInvite(\''+attr(x.code)+'\','+(x.active===false?'true':'false')+')">'+(x.active!==false?'Disable':'Enable')+'</button></div></div>').join(''):'<div class="mini-muted">No invite codes created yet.</div>')+
        '</div></div>'+
        '<div class="panel"><h2>Weekly recaps</h2><div class="mini-item"><b>Email digest</b><span class="mini-muted">Sends to users who enabled ShipmentScope email alerts.</span></div><div class="panel-actions"><button class="ctl good" onclick="sendWeeklyRecaps()">Send now</button></div></div>'+
      '</div>'+
      '<div class="grid-2" style="margin-top:16px;">'+
        '<div class="panel"><h2>Giveaway setup</h2><input class="admin-field" id="giveaway-title" value="'+attr(giveaway.title||'Monthly order giveaway')+'"/><div class="form-grid" style="grid-template-columns:1fr 1fr auto;margin-top:8px;"><input class="admin-field" id="giveaway-start" type="date" value="'+attr(giveaway.start||'')+'"/><input class="admin-field" id="giveaway-end" type="date" value="'+attr(giveaway.end||'')+'"/><button class="ctl good" onclick="saveGiveaway()">Save</button></div><div class="panel-actions"><button class="ctl good" onclick="pickGiveawayWinnerServer()">Pick + save winner</button></div><div class="mini-list">'+
          ((giveaway.history||[]).length?(giveaway.history||[]).slice(0,5).map(w=>'<div class="mini-item"><b>'+esc(w.email)+'</b><span class="mini-muted">'+fdate(w.ts)+' · '+(w.ordersThisMonth||0)+' orders this month</span></div>').join(''):'<div class="mini-muted">No saved winners yet.</div>')+
        '</div></div>'+
        '<div class="panel"><h2>Support inbox</h2><div class="mini-list">'+
          (supportItems.length?supportItems.map(r=>'<div class="mini-item"><b>'+esc(r.kind)+' · '+esc(r.email||'Unknown')+'</b><span>'+esc(r.message||'')+'</span><div class="mini-muted">'+fdate(r.ts)+' · '+esc(r.meta||'')+'</div></div>').join(''):'<div class="mini-muted">No support messages yet.</div>')+
        '</div></div>'+
      '</div>'+
      '<div class="section-lbl">Recent activity</div>'+
      '<div class="panel"><div class="mini-list">'+
        (activity.length?activity.slice(0,12).map(a=>'<div class="mini-item"><b>'+esc(a.type||'activity')+'</b><span class="mini-muted">'+fdate(a.ts)+(activityLine(a)?' · '+esc(activityLine(a)):'')+'</span></div>').join(''):'<div class="mini-muted">No activity yet.</div>')+
      '</div></div>'+
      '<div class="section-lbl">Signals</div>'+
      '<div class="grid-2">'+
        '<div class="panel"><h2>Orders by status</h2><div class="status-bars">'+
          Object.entries(s.statusBreakdown).map(([k,v])=>'<div class="status-row" style="--tone:'+(statusTone[k]||'#7c5cff')+'"><span>'+k+'</span><div class="status-track"><div class="status-fill" style="width:'+pct(v,s.totalOrders)+'%"></div></div><strong>'+v.toLocaleString()+'</strong></div>').join('')+
        '</div></div>'+
        '<div class="panel"><h2>Top users</h2>'+
          (topOrders.length?topOrders.slice(0,5).map(u=>'<div class="leader-row"><div class="avatar">'+esc(initials(u.email))+'</div><div class="leader-main"><b>'+esc(u.email)+'</b><span>'+u.ordersThisMonth+' this month · '+money(u.spend)+' tracked</span></div><div class="leader-score">'+u.orders+' orders</div></div>').join(''):'<div class="sub">No order activity yet.</div>')+
        '</div>'+
      '</div>'+
      '<div class="section-lbl">Users</div>'+
      '<div class="panel" style="margin-bottom:12px;"><div class="form-grid" style="grid-template-columns:1fr 190px auto;"><input class="admin-field" placeholder="Search users by email" value="'+attr(adminUserQuery)+'" oninput="setAdminUserSearch(this.value)"/><select class="admin-field" onchange="setAdminUserFilter(this.value)">'+
        ['all','expired','expiring','connected','no-orders','top-orders'].map(v=>'<option value="'+v+'" '+(adminUserFilter===v?'selected':'')+'>'+({all:'All users',expired:'Expired trials',expiring:'Expiring trials',connected:'Connected email', 'no-orders':'No orders', 'top-orders':'Leaderboard users'}[v])+'</option>').join('')+
      '</select><div class="mini-muted" style="align-self:center;">'+visibleUsers.length+' shown</div></div></div>'+
      '<div class="tbl-scroll"><table><tr><th>Email</th><th>Joined</th><th>Last login</th><th class="num">Orders</th><th class="num">This month</th><th class="num">Spend</th><th class="num">Inventory</th><th>Trial</th><th class="num">Referrals</th><th>Controls</th></tr>'+
        visibleUsers.map(u=>'<tr><td>'+esc(u.email)+'</td><td>'+fdate(u.createdAt)+'</td><td>'+fdate(u.lastLoginAt)+'</td><td class="num">'+u.orders+'</td><td class="num">'+u.ordersThisMonth+'</td><td class="num">'+money(u.spend)+'</td><td class="num">'+u.inventoryItems+'</td><td>'+trialPill(u.trialDaysLeft)+'</td><td class="num">'+u.referralCount+'</td><td class="controls"><div class="ctl-row">'+
          '<button class="ctl good" onclick="adminAction(\''+attr(u.id)+'\',\'extend-trial\',10)">+10d</button>'+
          '<button class="ctl good" onclick="adminAction(\''+attr(u.id)+'\',\'extend-trial\',30)">+30d</button>'+
          '<button class="ctl" onclick="adminAction(\''+attr(u.id)+'\',\'set-trial-days\',70)">Set days</button>'+
          '<button class="ctl" onclick="adminAction(\''+attr(u.id)+'\',\'make-unlimited\')">Unlimited</button>'+
          '<button class="ctl warn" onclick="adminAction(\''+attr(u.id)+'\',\'reset-referral\')">New code</button>'+
          '<button class="ctl warn" onclick="adminAction(\''+attr(u.id)+'\',\'reset-devices\')">Reset devices</button>'+
          '<button class="ctl bad" onclick="adminAction(\''+attr(u.id)+'\',\'expire-trial\')">Expire</button>'+
          '<button class="ctl bad" onclick="adminAction(\''+attr(u.id)+'\',\'force-logout\')">Logout</button>'+
          '<button class="ctl bad" onclick="adminAction(\''+attr(u.id)+'\',\'disconnect-email\')">Disconnect email</button>'+
        '</div></td></tr>').join('')+
      '</table></div>'+
      '<div class="section-lbl">Referrals</div>'+
      '<div class="panel">'+
        (topReferrals.some(u=>u.referralCount)?topReferrals.map(u=>'<div class="leader-row"><div class="avatar">'+esc(initials(u.email))+'</div><div class="leader-main"><b>'+esc(u.email)+'</b><span>'+esc(u.referralCode||'No code')+'</span></div><div class="leader-score">'+u.referralCount+' referrals</div></div>').join(''):'<div class="sub">No referrals completed yet.</div>')+
      '</div>'+
      '<div class="section-lbl">Latest feedback</div>'+
      ((s.feedback&&s.feedback.length)?s.feedback.map(f=>'<div class="fb"><div class="who">'+esc(f.email)+' · '+new Date(f.ts).toLocaleString()+'</div><div class="msg">'+esc(f.message)+'</div></div>').join(''):'<div class="sub">No feedback yet.</div>');
  }catch(e){
    el.innerHTML='<div class="err">Could not reach the server. Is it running?</div>';
  }
}
load();
</script>
