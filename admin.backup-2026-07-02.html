<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ShipmentScope — Developer Stats</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M9 12.5 14.5 9.5 20 12.5 14.5 15.5Z' fill='%23D4A63A'/%3E%3Cpath d='M9 12.5 14.5 15.5 14.5 22 9 19Z' fill='%230f1729'/%3E%3Cpath d='M20 12.5 14.5 15.5 14.5 22 20 19Z' fill='%23D4A63A' fill-opacity='.55'/%3E%3Ccircle cx='16.5' cy='15.5' r='9' stroke='%23f5f5f7' stroke-width='2'/%3E%3Cline x1='23' y1='22' x2='27.5' y2='26.5' stroke='%23f5f5f7' stroke-width='2.4' stroke-linecap='round'/%3E%3C/svg%3E"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0d;--bg2:#111114;--bg3:#18181c;--bg4:#202024;
  --brd:rgba(255,255,255,0.09);--brd2:rgba(255,255,255,0.16);
  --txt:#f5f5f7;--txt2:#cfcfd6;--txt3:#98989f;
  --accent:#5b9ee6;--accent-d:rgba(91,158,230,0.13);
  --green:#4fbf8b;--amber:#e0a742;--red:#f2665e;--purple:#9c8cec;
}
body{background:var(--bg);color:var(--txt);font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;padding:32px 20px;}
.wrap{max-width:1000px;margin:0 auto;}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.5px;}
.hdr-title .accent{color:var(--accent);}
.sub{font-size:13px;color:var(--txt3);font-weight:600;margin-bottom:32px;}
.section-lbl{font-size:11px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin:32px 0 12px;}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;}
.tile{background:var(--bg2);border:1px solid var(--brd);border-radius:14px;padding:20px;}
.tile-val{font-size:34px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;color:var(--txt);}
.tile-lbl{font-size:13px;font-weight:700;color:var(--txt2);margin-top:6px;}
.tile-sub{font-size:12px;color:var(--txt3);margin-top:3px;}
.tile.accent .tile-val{color:var(--accent);}
.tile.green .tile-val{color:var(--green);}
.tile.amber .tile-val{color:var(--amber);}
.tile.purple .tile-val{color:var(--purple);}
.status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;}
.status-tile{background:var(--bg2);border:1px solid var(--brd);border-radius:12px;padding:14px;}
.status-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.status-lbl{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-top:4px;}
.empty{text-align:center;padding:80px 20px;color:var(--txt3);}
.empty i{font-size:36px;display:block;margin-bottom:10px;}
.err{background:rgba(242,102,94,.13);border:1px solid rgba(242,102,94,.3);color:var(--red);border-radius:10px;padding:14px 16px;font-size:13px;font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <svg viewBox="0 0 32 32" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M9 12.5 14.5 9.5 20 12.5 14.5 15.5Z" fill="#5b9ee6"/>
      <path d="M9 12.5 14.5 15.5 14.5 22 9 19Z" fill="#0f1729"/>
      <path d="M20 12.5 14.5 15.5 14.5 22 20 19Z" fill="#5b9ee6" fill-opacity=".55"/>
      <circle cx="16.5" cy="15.5" r="9" stroke="#f5f5f7" stroke-width="2"/>
      <line x1="23" y1="22" x2="27.5" y2="26.5" stroke="#f5f5f7" stroke-width="2.4" stroke-linecap="round"/>
    </svg>
    <div class="hdr-title">Shipment<span class="accent">Scope</span> — Developer Stats</div>
  </div>
  <div class="sub">Real usage across every account on this install. No per-user data shown — aggregates only.</div>
  <div id="content"><div class="empty"><i class="ti ti-loader-2"></i><p>Loading…</p></div></div>
</div>
<script>
async function load(){
  const el=document.getElementById('content');
  try{
    const res=await fetch('/api/admin/stats');
    const data=await res.json();
    if(!data.ok){el.innerHTML='<div class="err">'+(data.message||'Could not load stats.')+'</div>';return;}
    const s=data.stats;
    if(!s.totalUsers){el.innerHTML='<div class="empty"><i class="ti ti-chart-bar"></i><p>No accounts yet — stats will appear once people sign up.</p></div>';return;}
    el.innerHTML=
      '<div class="tiles">'+
        '<div class="tile accent"><div class="tile-val">'+s.totalUsers.toLocaleString()+'</div><div class="tile-lbl">Total accounts</div><div class="tile-sub">'+s.signups7d+' new this week</div></div>'+
        '<div class="tile green"><div class="tile-val">'+s.totalOrders.toLocaleString()+'</div><div class="tile-lbl">Orders tracked</div><div class="tile-sub">'+s.avgOrdersPerUser+' avg per account</div></div>'+
        '<div class="tile amber"><div class="tile-val">$'+s.totalValue.toLocaleString()+'</div><div class="tile-lbl">Order value tracked</div><div class="tile-sub">excludes cancelled</div></div>'+
        '<div class="tile purple"><div class="tile-val">'+s.totalAccounts.toLocaleString()+'</div><div class="tile-lbl">Email accounts connected</div><div class="tile-sub">across all users</div></div>'+
      '</div>'+
      '<div class="section-lbl">Activity</div>'+
      '<div class="tiles">'+
        '<div class="tile"><div class="tile-val">'+s.active7d.toLocaleString()+'</div><div class="tile-lbl">Active in last 7 days</div><div class="tile-sub">logged in at least once</div></div>'+
        '<div class="tile"><div class="tile-val">'+s.signups30d.toLocaleString()+'</div><div class="tile-lbl">New accounts, last 30 days</div></div>'+
      '</div>'+
      '<div class="section-lbl">Orders by status</div>'+
      '<div class="status-grid">'+
        Object.entries(s.statusBreakdown).map(([k,v])=>'<div class="status-tile"><div class="status-val">'+v.toLocaleString()+'</div><div class="status-lbl">'+k+'</div></div>').join('')+
      '</div>';
  }catch(e){
    el.innerHTML='<div class="err">Could not reach the server. Is it running?</div>';
  }
}
load();
</script>
</body>
</html>
